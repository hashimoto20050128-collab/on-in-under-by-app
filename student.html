<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>児童用 ｜ 友達の部屋を予想しよう</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .top{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--cream-2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  .top .me{font-family:"Baloo 2";font-weight:800;color:var(--peach-d)}
  .wrap{padding:14px;max-width:880px;margin:0 auto}
  .hidden{display:none!important}
  .banner{border-radius:14px;padding:14px 16px;margin-bottom:12px;text-align:center;font-weight:700}
  .banner.build{background:#EDF4EE;border:1px solid var(--sage)}
  .banner.guess{background:#FFF1E2;border:1px solid #f0c98a}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;justify-content:center}
  .wait{min-height:50vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px}
  .wait .em{font-size:3rem}
  .submitted-veil{position:relative}
  .veil{position:absolute;inset:0;background:rgba(251,241,221,.82);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-weight:800;color:var(--sage-d)}
  .scorebox{text-align:center;background:#fff;border:2px solid var(--gold);border-radius:16px;padding:16px;margin-top:12px}
  .scorebox .big-num{font-size:2.6rem}
  .compare{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:680px){.compare{grid-template-columns:1fr}}
  .compare-label{font-weight:800;text-align:center;margin-bottom:6px}
  #guessCol .compare-label{color:var(--sage-d)}
  #answerLabel{color:var(--peach-d)}
  .tip{font-size:.8rem;color:var(--ink-soft);text-align:center;margin-top:6px}
  .fs-bar{display:flex;justify-content:flex-end;margin-bottom:6px}
  .fs-bar .btn{padding:.45em 1em;font-size:.9rem}
  /* 大きく表示（ブラウザ全画面に広げる） */
  #editBox.fs{position:fixed;inset:0;z-index:60;background:var(--cream);margin:0;
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));overflow:auto;
    display:flex;flex-direction:column;gap:8px}
  #editBox.fs .banner{margin:0}
  #editBox.fs #editorScene{margin:0 auto}
  #editBox.fs .tip{display:none}
</style>
</head>
<body>
<div class="top">
  <span class="me" id="meLabel">―</span>
  <span class="tag" id="phaseTag">接続中…</span>
  <span class="tag dot off" id="connTag" style="margin-left:auto">未接続</span>
</div>

<div class="wrap">
  <!-- 待機 -->
  <div id="waitBox" class="wait">
    <div class="em">⏳</div>
    <div id="waitMsg" style="font-weight:700">先生の合図をまっています…</div>
  </div>

  <!-- 配置エディタ（配置タイム／予想タイム共用） -->
  <div id="editBox" class="hidden">
    <div class="banner" id="editBanner"></div>
    <div class="fs-bar"><button class="btn ghost" id="fsBtn" onclick="toggleExpand()">⛶ 大きく表示</button></div>
    <div class="submitted-veil">
      <div id="editorScene"></div>
      <div class="veil hidden" id="editVeil"><div class="em">✅</div><div id="veilMsg">提出しました！</div><button class="btn ghost" id="reeditBtn">やり直す</button></div>
    </div>
    <div class="tray" id="tray" style="margin-top:12px;justify-content:center"></div>
    <div class="actions" id="editActions"></div>
    <div class="tip">物をタップでトレイから出し入れ／ドラッグで移動。✕でもどす。</div>
  </div>

  <!-- 出題者（説明する人） -->
  <div id="explainBox" class="hidden">
    <div class="banner guess">🎤 あなたが説明する番です！ お部屋を英語で説明しよう</div>
    <div id="ownScene"></div>
    <div class="tip">例: The ball is on the table. / The lamp is under the table.</div>
  </div>

  <!-- 結果 -->
  <div id="resultBox" class="hidden">
    <div class="banner build">🎉 けっか — あなたの予想とせいかいをくらべよう</div>
    <div class="compare" id="compareWrap">
      <div class="compare-col" id="guessCol">
        <div class="compare-label">✏️ あなたの予想</div>
        <div id="myGuessScene"></div>
      </div>
      <div class="compare-col">
        <div class="compare-label" id="answerLabel">⭕ せいかい</div>
        <div id="answerScene"></div>
      </div>
    </div>
    <div class="scorebox" id="myScoreBox"></div>
    <div style="text-align:center;font-weight:700;margin-top:14px" class="muted">いちばん近かった3人</div>
    <div id="topBox" style="margin-top:6px"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="firebase-config.js"></script>
<script src="common.js"></script>
<script>
const params=new URLSearchParams(location.search);
const CODE=(params.get('code')||'').toUpperCase();
const N=parseInt(params.get('n'),10);
document.getElementById('meLabel').textContent='出席番号 '+N;

if(!dbReady){ document.getElementById('phaseTag').textContent='Firebase未設定'; alert('firebase-config.js を設定してください'); }
const ref = dbReady ? db.ref('sessions/'+CODE) : null;
const meRef = dbReady ? ref.child('students/'+N) : null;
let session={};

// 参加登録
if(meRef){ meRef.child('joinedAt').once('value').then(s=>{ if(!s.exists()) meRef.update({joinedAt:Date.now()}); }); }

// シーン
const editorScene=new Scene(document.getElementById('editorScene'),{editable:true,onChange:onEdit});
const ownScene=new Scene(document.getElementById('ownScene'),{editable:false});
const answerScene=new Scene(document.getElementById('answerScene'),{editable:false});
const myGuessScene=new Scene(document.getElementById('myGuessScene'),{editable:false});
const palette=buildPalette(document.getElementById('tray'),editorScene);
function onEdit(){ palette.refresh(); }

// 「大きく表示」（ブラウザ全画面に広げる）
const editBox=document.getElementById('editBox');
function fitEditor(){
  const el=document.getElementById('editorScene');
  if(editBox.classList.contains('fs')){
    const availW=window.innerWidth-30;
    const availH=window.innerHeight-260; // バナー・トレイ・ボタンの分を確保
    const ratio=1918/1077;
    el.style.width=Math.max(280,Math.min(availW,availH*ratio))+'px';
  } else {
    el.style.width='';
  }
  editorScene.relayout();
}
function toggleExpand(){
  editBox.classList.toggle('fs');
  const on=editBox.classList.contains('fs');
  document.getElementById('fsBtn').textContent = on ? '✕ とじる' : '⛶ 大きく表示';
  fitEditor();
}

// 再描画時のレイアウト追従
window.addEventListener('resize',()=>{ fitEditor(); ownScene.relayout(); answerScene.relayout(); myGuessScene.relayout(); });

// 状態追従用フラグ
let buildLoaded=false, guessRound=-1;

if(ref){
  ref.on('value',snap=>{
    session=snap.val()||{};
    document.getElementById('connTag').textContent='接続中';
    document.getElementById('connTag').className='tag dot';
    render();
  },err=>{ document.getElementById('connTag').textContent='接続エラー'; });
}

const PHASE_JA={lobby:'説明',build:'配置タイム',guess:'予想タイム',result:'結果'};
function me(){ return (session.students&&session.students[N])||{}; }

function show(id){
  ['waitBox','editBox','explainBox','resultBox'].forEach(b=>{
    document.getElementById(b).classList.toggle('hidden', b!==id);
  });
  if(id!=='editBox' && editBox.classList.contains('fs')){
    editBox.classList.remove('fs');
    document.getElementById('fsBtn').textContent='⛶ 大きく表示';
    document.getElementById('editorScene').style.width='';
  }
}

function render(){
  const phase=session.phase||'lobby';
  if(phase==='ended'){ location.replace('index.html'); return; }
  document.getElementById('phaseTag').textContent=PHASE_JA[phase]||phase;
  editorScene.setAllowResize(!!session.allowResize);

  if(phase!=='build') buildLoaded=false;

  if(phase==='lobby'){
    show('waitBox');
    document.getElementById('waitMsg').textContent='先生の合図をまっています…';
  }
  else if(phase==='build'){ renderBuild(); }
  else if(phase==='guess'){
    if(session.currentExplainer===N){ renderExplain(); }
    else { renderGuess(); }
  }
  else if(phase==='result'){ renderResult(); }
}

/* 配置タイム */
function renderBuild(){
  show('editBox');
  document.getElementById('editBanner').className='banner build';
  document.getElementById('editBanner').innerHTML='✏️ じぶんのお部屋を作ろう → できたら「提出」';
  if(!buildLoaded){
    editorScene.setState(me().build||{});
    palette.refresh();
    buildLoaded=true;
  }
  const submitted=!!me().buildSubmitted;
  document.getElementById('editVeil').classList.toggle('hidden', !submitted);
  document.getElementById('veilMsg').textContent='提出しました！ 先生の合図をまってね';
  document.getElementById('reeditBtn').onclick=()=>{ meRef.child('buildSubmitted').set(false); };
  // ボタン
  const a=document.getElementById('editActions'); a.innerHTML='';
  a.appendChild(mkBtn('📷 画像で保存','ghost',()=>exportSceneImage(document.getElementById('editorScene'),'my-room-'+N+'.png')));
  a.appendChild(mkBtn('提出する ▶','big',submitBuild));
  fitEditor();
}
function submitBuild(){
  const st=editorScene.getState();
  if(Object.keys(st).length===0){ if(!confirm('物が1つも置かれていません。提出しますか？')) return; }
  meRef.update({ build:st, buildSubmitted:true });
}

/* 予想タイム（説明を聞く側） */
function renderGuess(){
  show('editBox');
  document.getElementById('editBanner').className='banner guess';
  document.getElementById('editBanner').innerHTML='👂 説明を聞いて、お部屋を予想して配置 → 「提出」';
  if(guessRound!==session.round){
    editorScene.setState({});
    palette.refresh();
    guessRound=session.round;
  }
  const g=me().guess;
  const submitted=g&&g.submitted&&g.round===session.round;
  document.getElementById('editVeil').classList.toggle('hidden', !submitted);
  document.getElementById('veilMsg').textContent='提出しました！ 結果をまってね';
  document.getElementById('reeditBtn').onclick=()=>{ meRef.child('guess/submitted').set(false); };
  const a=document.getElementById('editActions'); a.innerHTML='';
  a.appendChild(mkBtn('提出する ▶','big sage',submitGuess));
  fitEditor();
}
function submitGuess(){
  const st=editorScene.getState();
  meRef.child('guess').set({ round:session.round, objects:st, submitted:true });
}

/* 出題者画面 */
function renderExplain(){
  show('explainBox');
  ownScene.setState(me().build||{});
  setTimeout(()=>ownScene.relayout(),50);
}

/* 結果 */
function renderResult(){
  show('resultBox');
  const res=session.result||{};
  const isExplainer = res.explainer===N;

  // せいかい（出題者の部屋）
  answerScene.setState(res.target||{});
  // あなたの予想（今ラウンドの提出。出題者は予想なし）
  const g=me().guess;
  const myObjs = (!isExplainer && g && g.round===res.round) ? (g.objects||{}) : {};
  myGuessScene.setState(myObjs);
  setTimeout(()=>{ answerScene.relayout(); myGuessScene.relayout(); },50);

  // 出題者は「予想」列を隠し、正解だけを表示
  document.getElementById('guessCol').style.display = isExplainer ? 'none' : '';
  document.getElementById('compareWrap').style.gridTemplateColumns = isExplainer ? '1fr' : '';
  document.getElementById('answerLabel').textContent = isExplainer ? '⭐ あなたの出題（せいかい）' : '⭕ せいかい';

  const box=document.getElementById('myScoreBox');
  document.getElementById('topBox').innerHTML = topThreeHTML(res.ranking, false);
  if(isExplainer){
    box.innerHTML='🎤 あなたが出題者でした！';
  } else {
    const mine=(res.ranking||[]).find(r=>r.n===N);
    const winner=res.winner;
    if(mine){
      const rankPos=(res.ranking||[]).findIndex(r=>r.n===N)+1;
      box.innerHTML=`あなたの近さ <span class="big-num">${mine.score}</span> 点<br><span class="muted">${rankPos}位 ／ ${(res.ranking||[]).length}人中</span>`
        + (winner&&winner.n===N?'<br>🏆 1位！すごい！':'');
    } else {
      box.innerHTML='今回は提出がありませんでした';
    }
  }
}

function mkBtn(label,cls,fn){ const b=document.createElement('button'); b.className='btn '+cls; b.textContent=label; b.onclick=fn; return b; }
</script>
</body>
</html>
